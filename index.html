<!DOCTYPE html>

  <style>

    .accordion-arrow{color:#ef4444;font-weight:700;font-size:16px;margin-top:1px;flex-shrink:0}

    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer}
    textarea,input[type=text],input[type=number]{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:#e8e8e8;font-size:14px;padding:10px 12px;resize:none;font-family:inherit}
    textarea:focus,input[type=text]:focus,input[type=number]:focus{outline:none;border-color:#444}
    select{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:#e8e8e8;font-size:14px;padding:10px 12px;font-family:inherit;-webkit-appearance:none}
    .btn-primary{width:100%;padding:20px 0;background:#ef4444;color:#fff;font-weight:700;font-size:18px;border:none;border-radius:14px;cursor:pointer;letter-spacing:.02em;font-family:inherit;transition:background .3s}

    .btn-start{background:#f59e0b;color:#000;font-weight:800;font-size:15px;border:none;border-radius:9px;padding:13px 32px;cursor:pointer;letter-spacing:.02em;font-family:inherit}
    .btn-ghost{background:transparent;color:#555;font-weight:600;font-size:13px;border:1px solid #2a2a2a;border-radius:9px;padding:10px 20px;cursor:pointer;font-family:inherit}
    .btn-share{width:100%;padding:13px 0;background:#1e3a5f;border:1px solid #2563eb;color:#60a5fa;font-weight:700;font-size:14px;border-radius:9px;cursor:pointer;font-family:inherit;margin-bottom:10px}
    .field-label{font-size:12px;color:#777;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px}
    .urge-num{font-size:28px;font-weight:800;min-width:32px;text-align:center}
    .log-entry{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:18px;margin-bottom:12px}
    .log-meta{display:flex;justify-content:space-between;margin-bottom:4px}
    .log-date{font-size:12px;color:#555}
    .log-urge{font-size:13px;font-weight:700}
    .log-line{font-size:13px;color:#aaa;margin-top:2px}
    .log-line b{color:#666}
    .board-gain{border:1px solid #1e2a1e}
    .board-lose{border:1px solid #2a1e1e}
    .board-label{font-size:12px;text-transform:uppercase;letter-spacing:.15em;font-weight:700;margin-bottom:12px}
    .board-row{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1a1a1a;align-items:flex-start}
    .board-row:last-child{border-bottom:none}
    .meeting-link{display:flex;justify-content:space-between;align-items:center;background:#111;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:14px;text-decoration:none}
    .meeting-name{font-size:15px;font-weight:600;color:#e8e8e8;margin-bottom:3px}
    .meeting-type{font-size:12px;color:#555}
    .streak-card{background:#111;border:1px solid #222;border-radius:14px;padding:28px;text-align:center;margin-bottom:16px}
    .streak-num{font-size:72px;font-weight:800;line-height:1;margin-bottom:8px}
    .streak-sub{font-size:14px;color:#666;margin-bottom:20px}
    .streak-date{font-size:12px;color:#444;margin-bottom:20px}
    .milestone-row{display:flex;justify-content:space-between;padding:16px 0;border-bottom:1px solid #1a1a1a;align-items:center}
    .milestone-row:last-child{border-bottom:none}
    .section-label{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:#0a0a0a;border-top:1px solid #1a1a1a;display:flex;flex-direction:row;flex-wrap:nowrap;justify-content:flex-start;align-items:center;padding:12px 4px 30px;z-index:20;overflow-x:scroll;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x;will-change:scroll-position}.bottom-nav::-webkit-scrollbar{display:none;height:0;width:0}
    .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;font-family:inherit;transition:opacity .2s;min-width:62px;flex-shrink:0}
    .nav-icon{font-size:24px}
    .nav-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    .modal-sheet{background:#111;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;max-height:80vh;overflow-y:auto}
    .sponsor-block{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;margin-bottom:12px}
    .sponsor-block-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
    .sponsor-stat{font-size:28px;font-weight:800;color:#f59e0b}
    .sponsor-stat-label{font-size:12px;color:#666;margin-top:2px}
    .btn-copy{width:100%;padding:12px;background:#2563eb;color:#fff;font-weight:700;font-size:14px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;margin-bottom:10px}
    .btn-close{width:100%;padding:12px;background:transparent;color:#555;font-size:14px;border:1px solid #2a2a2a;border-radius:9px;cursor:pointer;font-family:inherit}
    .release-log-entry{background:#111;border:1px solid #1e1e1e;border-radius:9px;padding:10px 14px;margin-bottom:6px}
    .tag{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;font-size:11px;color:#888;padding:2px 7px;margin:2px 2px 0 0}
    .tag.green{border-color:#166534;color:#22c55e;background:#0f2a1a}
    .fitness-sub-tabs{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px}
    .fsub-btn{background:#111;border:1px solid #222;border-radius:20px;color:#555;font-size:14px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
    .fsub-btn.active{background:#1a2a1a;border-color:#22c55e;color:#22c55e}
    .progress-bar-bg{background:#1a1a1a;border-radius:4px;height:6px;flex:1;margin:0 10px}
    .progress-bar-fill{height:6px;border-radius:4px;background:#22c55e;transition:width .4s}
    .workout-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .workout-type-btn{background:#111;border:1px solid #222;border-radius:9px;color:#888;font-size:13px;font-weight:600;padding:10px;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
    .workout-type-btn.selected{background:#1a2a1a;border-color:#22c55e;color:#22c55e}
    .supp-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #1a1a1a}
    .supp-row:last-child{border-bottom:none}
    .supp-check{width:46px;height:46px;border-radius:10px;border:2px solid #333;background:#0d0d0d;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .supp-check.checked{background:#166534;border-color:#22c55e}
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
    .photo-card{background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;position:relative;aspect-ratio:3/4;cursor:pointer}
    .photo-card img{width:100%;height:100%;object-fit:cover}
    .photo-date-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.7);border-radius:4px;font-size:10px;color:#888;padding:2px 6px}
    .journal-entry-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:20px;margin-bottom:14px}
    .journal-entry-meta{font-size:11px;color:#555;margin-bottom:6px}
    .journal-entry-preview{font-size:13px;color:#777;line-height:1.5}
    .mood-btn{border:1px solid #2a2a2a;border-radius:50%;width:64px;height:64px;font-size:32px;background:#111;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .mood-btn.selected{border-color:#f59e0b;background:#2a1a00;transform:scale(1.15)}
    .prompt-box{background:#0d0d0d;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#888;font-style:italic;line-height:1.5}
    .habit-row{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-bottom:1px solid #1a1a1a}
    .habit-row:last-child{border-bottom:none}
    .habit-streak-badge{font-size:11px;color:#f59e0b;background:#1a1200;border:1px solid #2a2000;border-radius:10px;padding:2px 8px}
    .habit-check{width:50px;height:50px;border-radius:12px;border:2px solid #333;background:#0d0d0d;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;transition:all .2s}
    .habit-check.checked{background:#166534;border-color:#22c55e}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-sub">Recovery Companion</div>
    <div class="header-title">Stay the Course</div>
    <div id="daily-quote-bar" style="margin-top:12px;padding-top:12px;border-top:1px solid #1e1e1e;cursor:pointer" onclick="toggleSerenity()">
      <div id="quote-display"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <nav class="bottom-nav" id="nav"></nav>
</div>
<div id="modal-overlay" style="display:none"></div>

<script>
const STORAGE_KEY="recovery_data_v1";
const SERENITY_PRAYER="God, grant me the serenity to accept the things I cannot change, the courage to change the things I can, and the wisdom to know the difference.";
const DAILY_QUOTES=[
  {text:"Recovery is not a race. You don't have to feel guilty if it takes you longer than you thought.",author:"Anonymous"},
  {text:"The goal isn't to be sober. The goal is to love yourself so much that you don't need to.",author:"Anonymous"},
  {text:"You don't have to see the whole staircase. Just take the first step.",author:"Martin Luther King Jr."},
  {text:"Every moment is a fresh beginning.",author:"T.S. Eliot"},
  {text:"Courage isn't having the strength to go on — it is going on when you don't have the strength.",author:"Napoleon Bonaparte"},
  {text:"You are not your addiction. You are a person who has an addiction.",author:"Anonymous"},
  {text:"The first step towards getting somewhere is to decide you're not going to stay where you are.",author:"J.P. Morgan"},
  {text:"Fall seven times, stand up eight.",author:"Japanese Proverb"},
  {text:"One day at a time. This is enough.",author:"Anonymous"},
  {text:"Pain is inevitable. Suffering is optional.",author:"Haruki Murakami"},
  {text:"Rock bottom became the solid foundation on which I rebuilt my life.",author:"J.K. Rowling"},
  {text:"The only way out is through.",author:"Robert Frost"},
  {text:"Sobriety was the greatest gift I ever gave myself.",author:"Rob Lowe"},
  {text:"Nothing changes if nothing changes.",author:"Anonymous"},
  {text:"You can't go back and change the beginning, but you can start where you are and change the ending.",author:"C.S. Lewis"},
  {text:"Accept what is, let go of what was, have faith in what will be.",author:"Anonymous"},
  {text:"The struggle you're in today is developing the strength you need tomorrow.",author:"Anonymous"},
  {text:"I am not defined by my relapses, but by my decision to remain in recovery.",author:"Anonymous"},
  {text:"There is no elevator to sobriety. You have to take the steps.",author:"Anonymous"},
  {text:"The greatest glory in living lies not in never falling, but in rising every time we fall.",author:"Nelson Mandela"},
  {text:"Act as if what you do makes a difference. It does.",author:"William James"},
  {text:"Be gentle with yourself. You are a child of the universe, no less than the trees and the stars.",author:"Max Ehrmann"},
  {text:"What you are is what you have been. What you will be is what you do now.",author:"Buddha"},
  {text:"Believe you can and you're halfway there.",author:"Theodore Roosevelt"},
  {text:"Do not let what you cannot do interfere with what you can do.",author:"John Wooden"},
  {text:"Recovery gives you the chance to dream again.",author:"Anonymous"},
  {text:"Strength does not come from winning. Your struggles develop your strengths.",author:"Arnold Schwarzenegger"},
  {text:"Man never made any material as resilient as the human spirit.",author:"Bernard Williams"},
  {text:"It does not matter how slowly you go as long as you do not stop.",author:"Confucius"},
  {text:"What lies behind us and what lies before us are tiny matters compared to what lies within us.",author:"Ralph Waldo Emerson"}
];
function getDailyQuote(){const day=Math.floor(Date.now()/86400000);return DAILY_QUOTES[day%DAILY_QUOTES.length];}

const RED_ALERTS=[
  {trigger:"Home alone",responses:["Call someone right now — don't wait","Go to the gym immediately","Leave the house — coffee shop, anywhere","Work in the garage with the door open","Urge surf: sit with it, name where you feel it in your body, breathe — urges pass in 20-30 min","Text your sponsor your location and urge level","Put every screen in a different room","Plan your next hour in detail — idle time feeds the urge"]},
  {trigger:"Wife asleep",responses:["Phone goes in the kitchen — not the bedroom","Read recovery material until tired","Do pushups or situps to physical exhaustion","Wake Sabrina and tell her you're struggling — honesty is the shield","Urge surf: close eyes, locate the feeling, breathe into it, watch it rise and fall","Repeat your commitment statement out loud 3 times","Write in journal until the urge loses power","Call sponsor's voicemail even if they don't pick up — saying it out loud breaks the secrecy"]},
  {trigger:"Argument with Sabrina",responses:["Take a walk before touching any screen","Call sponsor before you process it alone","Write down what you actually FEEL — not what happened","Give it 30 minutes before returning to the conversation","Name the emotion: hurt? Rejection? Disrespect? Fear?","Do not use the argument as justification — it never is","Pray specifically about the conflict","Arguments are a middle-circle trigger — execute your plan automatically"]},
  {trigger:"Feeling rejected sexually",responses:["Name the feeling out loud — rejection, not emergency","Journal it — don't act on it","Call a trusted friend or sponsor","Pray or meditate on it","Your worth is not tied to sexual availability","This feeling is the trigger, not the truth — write what's actually true","Heavy physical exercise — redirect the energy","Talk to Sabrina about how you feel, not what you want"]},
  {trigger:"Late at night",responses:["Phone goes to charger in another room — non-negotiable","10-minute breathing or prayer before sleep","Wake Sabrina if the urge is at a 7 or higher","Cold shower — resets the nervous system fast","Urge surf: lie still, locate the urge, breathe through it, it will pass","Read recovery literature instead of screens","If you can't sleep, go to another room and journal — don't stay in bed with phone"]},
  {trigger:"Long drives",responses:["Recovery podcast or audiobook on before you start — no silence","Call someone during the drive — sponsor, friend, family","No social media at stops — leave phone in the car","Plan check-in calls at specific milestones","Keep podcast loud enough that your mind can't wander","Pray out loud during the drive"]},
  {trigger:"Anxiety",responses:["Name the anxiety — write exactly what you're afraid of","4-7-8 breathing: inhale 4, hold 7, exhale 8 — do 4 rounds","Call sponsor before the anxiety builds momentum","Cold shower or cold plunge — physiologically resets anxiety fast","Walk outside immediately — movement metabolizes anxiety hormones","Urge surf: anxiety and urge often feel the same — observe it, don't feed it","Box breathing: 4 in, hold 4, out 4, hold 4 — repeat 5 times","Write down every anxious thought — getting it out reduces its power"]},
  {trigger:"Stress",responses:["Rate it 1-10 out loud — naming it reduces its power","Leave the environment for 10 minutes before any decisions","Heavy exercise — stress hormones need physical discharge","Call someone — don't sit with it alone","Write down specifically what's stressing you — vague stress is more dangerous","Breathe: stress compresses breathing, slow it down on purpose","Tell Sabrina your stress level — secrecy and stress together are high risk"]},
  {trigger:"Social media",responses:["Delete the app — right now, not later","Put phone face down and walk to a different room","Replace with a recovery podcast immediately","Call someone instead of scrolling","Set screen time limits in iPhone Settings","Recognize scrolling as numbing — ask what you're numbing","Log the urge in this app before you do anything else"]},
  {trigger:"TV / Mindless watching",responses:["Turn it off — don't negotiate with yourself","Switch to a recovery podcast or audiobook","Go do something physical immediately","Text your sponsor what you were watching and how you felt","Recognize TV as a numbing tool — ask what you're avoiding","Replace with 20 minutes of reading recovery material"]},
  {trigger:"Mindless scrolling",responses:["Put the phone down and walk away from it","Delete the app if it keeps happening — you've given it enough chances","Replace with a recovery podcast","Call someone — scrolling is isolation with a screen","Ask: what am I looking for right now? Name it honestly","Use iPhone Screen Time to lock yourself out after 10 minutes"]},
  {trigger:"Loneliness",responses:["Call — don't text. Voice connection is different","Go somewhere public — coffee shop, gym","Reach out to an SAA or SLAA member specifically","Tell Sabrina how you're feeling","Loneliness is one of the highest-risk states — treat it like a 7/10 urge","Attend a meeting today, even online","Do something for someone else — service breaks loneliness faster than anything","Isolation is where the addiction lives — don't give it the room"]},
  {trigger:"Isolation",responses:["Leave the house immediately — non-negotiable","Call sponsor","Go to a meeting today","Do not be alone with your phone","Isolation is not peace — it's the addiction's home court","Text three people right now just to make contact","Change your physical environment in the next 5 minutes"]},
  {trigger:"Shame",responses:["Name it out loud — shame grows in silence and dies in the light","Call sponsor immediately — do not process shame alone","Do not isolate with this feeling","Read your Recovery Board","Shame says you ARE bad — the truth is you DID something bad. You are not your addiction","Write down the shame and then write the truth next to it","Tell one safe person exactly what you're feeling","Shame is the biggest relapse driver — treat it like a 9/10 urge","Pray: ask for relief from shame, not escape from it"]},
  {trigger:"Guilt",responses:["Write down specifically what you feel guilty about","Call sponsor or accountability partner","Make amends if possible — action beats rumination every time","Pray or meditate on it","Talk to Sabrina if appropriate","Guilt is useful only if it changes today's behavior","Ask: is there an amend I'm avoiding? Make it.","Write what you would tell a friend in this situation — then apply it to yourself"]},
  {trigger:"Compulsive shopping / spending",responses:["Close every browser tab and shopping app now","Call sponsor before any non-essential purchase","Write down what you're actually feeling — spending is numbing","Wait 24 hours on any purchase over $50","Tell Sabrina — no financial secrets, ever","Ask: what need am I trying to meet with this purchase?","Put your credit card in a different room or give it to Sabrina temporarily"]},
  {trigger:"Compulsive behaviors",responses:["Name the behavior and the feeling driving it","Call sponsor immediately","Leave the environment","Replace with a physical release right now","Log it in this app — awareness is the first intervention","Ask: what is this behavior doing for me? What need is it meeting?","Call someone and say out loud what you almost did"]},
  {trigger:"Alcohol",responses:["Do not take the first drink — that is the only one that matters","Call sponsor or AA contact immediately","Leave the environment entirely","Call Sabrina","Go to a meeting today","Alcohol lowers every defense you have — it is a direct path to acting out","Call SAMHSA: 1-800-522-4700 if it's critical","Alcohol is not a separate problem — it feeds the same addiction"]},
  {trigger:"Chemical / substance urge",responses:["Call sponsor before anything else","Remove yourself from the environment immediately","Call SAMHSA: 1-800-522-4700","Tell someone you trust right now — say the words out loud","Do not be alone with this","Substances and sexual compulsion feed each other — this is high alert","Go to an AA or NA meeting today in addition to SAA"]},
  {trigger:"Overeating / not eating",responses:["Notice the emotion underneath — food is the symptom","Step away from the kitchen for 10 minutes","Drink a full glass of water and wait","Journal what you're actually feeling right now","Ask: am I hungry or am I feeling something I don't want to feel?","Log it — compulsive eating patterns often run parallel to other addictive patterns"]},
  {trigger:"Disconnected from marriage",responses:["Tell Sabrina you feel disconnected — use those exact words","Plan something intentional with her today, even small","Write 3 things you love about her right now","Ask her how she's really doing — and actually listen","Call sponsor if the disconnection is feeding urges","Disconnection is a warning sign, not a reason to act out","Make physical contact — hold her hand, sit next to her","What have you done in the last 48 hours to invest in this marriage?"]},
  {trigger:"Low confidence",responses:["Name what specifically is making you feel low — vague bad feelings are more dangerous","Read your Recovery Board right now","Call sponsor or someone who knows the real you","Do not make any major decisions from this state","20 pushups or heavy exercise — confidence lives in the body first","Write 3 things you've done right this week, no matter how small","Low confidence is a trigger — the addiction will offer a false fix. Don't take it","Pray specifically about how you see yourself right now","Tell Sabrina how you're feeling — vulnerability builds real confidence"]}
];

const RELEASE_MENU={

      </div>`).join("")}`:""}`;
}
window.toggleRelease=i=>{expandedRelease=expandedRelease===i?null:i;render();};
window.logRelease=item=>{
  const data=loadData();let logs=data.releaseLogs||[];
  const todayIdx=logs.findIndex(l=>l.item===item&&l.date&&l.date.startsWith(getTodayStr()));
  if(todayIdx>-1){
    logs.splice(todayIdx,1);
  } else {
    const lastUrge=data.urgeLogs&&data.urgeLogs.length?data.urgeLogs[data.urgeLogs.length-1].urge:null;
    logs.push({item,date:new Date().toISOString(),urge:lastUrge});
  }
  saveData({...data,releaseLogs:logs});renderContent();
};

window.showSponsorModal=()=>{
  const data=loadData();const days=streakDays(data);
  const urgeLogs=(data.urgeLogs||[]).slice(-7).reverse();
  const relapseCount=(data.relapseLogs||[]).length;
  const avgUrge=urgeLogs.length?(urgeLogs.reduce((s,l)=>s+(+l.urge||0),0)/urgeLogs.length).toFixed(1):"--";
  const topRelease=getTopRelease(data);
  const smsText=`Recovery Update\nStreak: ${days} days\nAvg urge (7d): ${avgUrge}/10\nCheck-ins: ${(data.urgeLogs||[]).length}\nRelapses: ${relapseCount}${topRelease?"\nTop tool: "+topRelease:""}\n\nRecent:\n${urgeLogs.slice(0,5).map(l=>`${l.date} - ${l.urge}/10${l.situation?" | "+l.situation:""}`).join("\n")}`;
  document.getElementById("modal-overlay").style.display="flex";
  document.getElementById("modal-overlay").innerHTML=`<div class="modal-sheet">
    <div style="font-size:18px;font-weight:800;margin-bottom:6px">Sponsor Summary</div>
    <div style="font-size:13px;color:#555;margin-bottom:20px">A snapshot of where you're at.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${[["Streak",days,"days","#f59e0b"],["Avg Urge",avgUrge,"/ 10",urgeColor(+avgUrge||5)],["Check-ins",(data.urgeLogs||[]).length,"total","#60a5fa"],["Relapses",relapseCount,"logged",relapseCount>0?"#ef4444":"#22c55e"]].map(([t,v,l,c])=>`<div class="sponsor-block">
        <div class="sponsor-block-title">${t}</div>
        <div class="sponsor-stat" style="color:${c}">${v}</div>
        <div class="sponsor-stat-label">${l}</div>
      </div>`).join("")}
    </div>
    ${topRelease?`<div class="sponsor-block" style="margin-bottom:14px"><div class="sponsor-block-title">Most Used Tool</div><div style="font-size:15px;font-weight:700;color:#e8e8e8;margin-top:4px">${topRelease}</div></div>`:""}
    <a href="sms:?&body=${encodeURIComponent(smsText)}" style="text-decoration:none"><button class="btn-copy">Send as Text Message</button></a>
    <button class="btn-copy" onclick="copyToClipboard('${smsText.replace(/'/g,"\\'")}')">Copy to Clipboard</button>
    <button class="btn-close" onclick="closeModal()">Close</button>

};
function getTopRelease(data){const logs=data.releaseLogs||[];if(!logs.length)return null;const c={};logs.forEach(l=>{c[l.item]=(c[l.item]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;}
window.copyToClipboard=(text)=>{if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert("Copied!"));}};
window.closeModal=()=>{document.getElementById("modal-overlay").style.display="none";};

window.savePeptideEdit=i=>{
  const data=loadData();
  const customPeptides=data.customPeptides||[];
  const allPeptides=[...DEFAULT_PEPTIDES,...customPeptides];
  const p=allPeptides[i];
  const name=(document.getElementById('pedit-name-'+i)||{}).value||p.name;
  const dose=(document.getElementById('pedit-dose-'+i)||{}).value||p.defaultDose;
  const unit=(document.getElementById('pedit-unit-'+i)||{}).value||p.unit;
  const time=(document.getElementById('pedit-time-'+i)||{}).value||p.time;
  const site=(document.getElementById('pedit-site-'+i)||{}).value||'';
  const freq=(document.getElementById('pedit-freq-'+i)||{}).value||p.frequency||'';
  const updated={name,defaultDose:dose,unit,time,defaultSite:site,frequency:freq};
  if(i<DEFAULT_PEPTIDES.length){
    // Overriding a default — store in customOverrides
    const overrides=data.peptideOverrides||{};
    overrides[i]=updated;
    data.peptideOverrides=overrides;
  } else {
    customPeptides[i-DEFAULT_PEPTIDES.length]=updated;
    data.customPeptides=customPeptides;
  }
  delete data._peptideEditIdx;
  saveData(data);
  renderContent();
};
window.deletePeptide=i=>{
  if(!confirm('Delete this peptide?'))return;
  const data=loadData();
  const customPeptides=data.customPeptides||[];
  if(i<DEFAULT_PEPTIDES.length){
    const hidden=data.peptideHidden||[];
    hidden.push(i);
    data.peptideHidden=hidden;
  } else {
    customPeptides.splice(i-DEFAULT_PEPTIDES.length,1);
    data.customPeptides=customPeptides;
  }
  delete data._peptideEditIdx;
  saveData(data);
  renderContent();
};
window.addNewPeptide=()=>{
  const data=loadData();
  const custom=data.customPeptides||[];
  custom.push({name:'New Peptide',defaultDose:'',unit:'mcg',time:'PM',defaultSite:''});
  const newIdx=DEFAULT_PEPTIDES.length+custom.length-1;
  saveData({...data,customPeptides:custom,_peptideEditIdx:newIdx});
  renderContent();
};

// HABITS
let habitView="weekly",habitMonthOffset=0;

function renderHabits(){
  const data=loadData();const todayKey="habits_"+getTodayStr();
  const todayDone=data[todayKey]||[];const customHabits=data.customHabits||[];
  const allHabits=[...DEFAULT_HABITS,...customHabits];
  const completedToday=todayDone.length;const totalHabits=allHabits.length;
  const pct=totalHabits?Math.round((completedToday/totalHabits)*100):0;
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10));}
  const now=new Date();
  const monthDate=new Date(now.getFullYear(),now.getMonth()+habitMonthOffset,1);
  const monthYear=monthDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const daysInMonth=new Date(monthDate.getFullYear(),monthDate.getMonth()+1,0).getDate();
  const firstDayOfWeek=new Date(monthDate.getFullYear(),monthDate.getMonth(),1).getDay();
  const monthDays=[];
  for(let d=1;d<=daysInMonth;d++){const dt=new Date(monthDate.getFullYear(),monthDate.getMonth(),d);monthDays.push(dt.toISOString().slice(0,10));}
  return `
    <div class="section-title"><h2>Daily Habits</h2><p>Small things done consistently change everything.</p></div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:22px;font-weight:800;color:${pct===100?"#22c55e":"#e8e8e8"}">${completedToday} <span style="font-size:14px;font-weight:400;color:#555">/ ${totalHabits} today</span></div>
          <div style="font-size:12px;color:#555;margin-top:2px">${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        </div>
        <div style="font-size:28px;font-weight:800;color:${pct===100?"#22c55e":pct>=50?"#f59e0b":"#555"}">${pct}%</div>
      </div>
      <div class="progress-bar-bg" style="margin:0"><div class="progress-bar-fill" style="width:${pct}%;background:${pct===100?"#22c55e":"#f59e0b"}"></div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button onclick="habitView='weekly';renderContent()" style="flex:1;padding:9px;border-radius:9px;border:1px solid ${habitView==="weekly"?"#22c55e":"#2a2a2a"};background:${habitView==="weekly"?"#1a2a1a":"#111"};color:${habitView==="weekly"?"#22c55e":"#555"};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Weekly</button>
      <button onclick="habitView='monthly';renderContent()" style="flex:1;padding:9px;border-radius:9px;border:1px solid ${habitView==="monthly"?"#22c55e":"#2a2a2a"};background:${habitView==="monthly"?"#1a2a1a":"#111"};color:${habitView==="monthly"?"#22c55e":"#555"};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Monthly</button>
    </div>
    ${habitView==="weekly"?renderHabitsWeekly(data,allHabits,todayDone,last7):renderHabitsMonthly(data,allHabits,monthDays,monthYear,daysInMonth,firstDayOfWeek)}
    <div class="card" style="margin-bottom:20px">
      <label class="field-label" style="margin-bottom:10px">Add Custom Habit</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="new-habit-input" placeholder="e.g. Cold plunge..." style="flex:1" />
        <button onclick="addCustomHabit()" style="background:#1a2a1a;border:1px solid #22c55e;color:#22c55e;border-radius:8px;padding:0 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Add</button>
      </div>
    </div>`;
}

function renderHabitsWeekly(data,allHabits,todayDone,last7){
  return `<div class="card" style="margin-bottom:14px">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px">
      ${last7.map(d=>`<div style="text-align:center;font-size:9px;color:#444;text-transform:uppercase">${new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"})}<br><span style="font-size:10px;color:#333">${new Date(d+"T12:00:00").getDate()}</span></div>`).join("")}
    </div>

        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:14px">${h.icon||"+"}</span>
            <span style="font-size:12px;font-weight:600;color:${done?"#22c55e":"#e8e8e8"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.name}</span>
            ${streak>1?`<span class="habit-streak-badge" style="flex-shrink:0">${streak}d</span>`:""}
          </div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:5px">
            ${last7.map((d,di)=>{const isDone=(data["habits_"+d]||[]).includes(hid);const isToday=di===6;return `<div style="display:flex;justify-content:center"><div style="width:18px;height:18px;border-radius:3px;background:${isDone?"#22c55e":"#1a1a1a"};border:${isToday?"1.5px solid #555":"none"};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">${isDone?"v":""}</div></div>`;}).join("")}
          </div>
        </div>
        <div class="habit-check${done?" checked":""}" style="margin-left:10px" onclick="toggleHabit('${hid.replace(/'/g,"\\'")}')">
          ${done?"&#x2713;":""}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderHabitsMonthly(data,allHabits,monthDays,monthYear,daysInMonth,firstDayOfWeek){
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button onclick="habitMonthOffset--;renderContent()" style="background:#111;border:1px solid #222;border-radius:8px;color:#aaa;font-size:20px;width:38px;height:38px;cursor:pointer;font-family:inherit">&lt;</button>
      <span style="font-size:15px;font-weight:700;color:#e8e8e8">${monthYear}</span>
      <button onclick="habitMonthOffset=Math.min(0,habitMonthOffset+1);renderContent()" style="background:#111;border:1px solid #222;border-radius:8px;color:${habitMonthOffset<0?"#aaa":"#333"};font-size:20px;width:38px;height:38px;cursor:pointer;font-family:inherit" ${habitMonthOffset>=0?"disabled":""}>&gt;</button>
    </div>
    ${allHabits.map(h=>{
      const hid=h.id||h.name;
      const completedDays=monthDays.filter(d=>(data["habits_"+d]||[]).includes(hid)).length;
      const pctM=Math.round((completedDays/daysInMonth)*100);
      const color=pctM>=80?"#22c55e":pctM>=50?"#f59e0b":"#ef4444";
      return `<div class="card" style="margin-bottom:10px;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px">${h.icon||"+"}</span>
            <span style="font-size:13px;font-weight:700;color:#e8e8e8">${h.name}</span>
          </div>
          <span style="font-size:12px;font-weight:700;color:${color}">${completedDays}/${daysInMonth} &bull; ${pctM}%</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">
          ${["S","M","T","W","T","F","S"].map(d=>`<div style="text-align:center;font-size:8px;color:#444;padding-bottom:2px">${d}</div>`).join("")}
          ${Array(firstDayOfWeek).fill("<div></div>").join("")}
          ${monthDays.map(d=>{const isDone=(data["habits_"+d]||[]).includes(hid);const isToday=d===getTodayStr();const dn=parseInt(d.slice(-2));return `<div style="aspect-ratio:1;border-radius:3px;background:${isDone?"#22c55e":"#1a1a1a"};border:${isToday?"1.5px solid #f59e0b":"none"};display:flex;align-items:center;justify-content:center;font-size:8px;color:${isDone?"#fff":"#444"}">${dn}</div>`;}).join("")}
        </div>
        <div class="progress-bar-bg" style="margin:0"><div class="progress-bar-fill" style="width:${pctM}%;background:${color}"></div></div>
      </div>`;
    }).join("")}`;
}

function getHabitStreak(data,habitId,last7){
  let streak=0;
  for(let i=last7.length-1;i>=0;i--){const d=data["habits_"+last7[i]]||[];if(d.includes(habitId))streak++;else break;}
  return streak;
}
window.toggleHabit=id=>{
  const data=loadData();const todayKey="habits_"+getTodayStr();
  const done=data[todayKey]||[];const idx=done.indexOf(id);
  if(idx>-1)done.splice(idx,1);else done.push(id);
  saveData({...data,[todayKey]:done});renderContent();
};
window.addCustomHabit=()=>{
  const input=document.getElementById("new-habit-input");const val=input?input.value.trim():"";if(!val)return;
  const data=loadData();const custom=data.customHabits||[];
  if(!custom.find(h=>h.name===val)){custom.push({name:val,icon:"&#x2B50;"});saveData({...data,customHabits:custom});}
  renderContent();
};

// RENDER
const renderers=[renderHome,renderShield,renderCheckIn,renderRelease,renderBoard,renderMeetings,renderStreak,renderFitness,renderJournal,renderHabits];
function renderContent(){document.getElementById("content").innerHTML=renderers[currentTab]();}
function render(){renderContent();renderNav();}

let showingSerenity=false;
function renderQuote(){
  const el=document.getElementById("quote-display");if(!el)return;
  if(showingSerenity){
    el.innerHTML=`<div style="font-size:11px;color:#f59e0b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Serenity Prayer</div><div style="font-size:13px;color:#aaa;line-height:1.6;font-style:italic">${SERENITY_PRAYER}</div><div style="font-size:10px;color:#444;margin-top:6px">Tap for daily quote</div>`;
  }else{
    const q=getDailyQuote();
    el.innerHTML=`<div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Today</div><div style="font-size:13px;color:#aaa;line-height:1.6;font-style:italic">"${q.text}"</div><div style="font-size:11px;color:#444;margin-top:5px">— ${q.author}</div><div style="font-size:10px;color:#333;margin-top:4px">Tap for Serenity Prayer</div>`;
  }
}
window.toggleSerenity=()=>{showingSerenity=!showingSerenity;renderQuote();};

render();
renderQuote();

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
